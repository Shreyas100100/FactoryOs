spring:
  profiles:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/factoryOs}
    username: postgres
    password: ${DB_PASSWORD:user}
  jpa:
    hibernate.ddl-auto: validate
    show-sql: true
  data.redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      show-components: never
    info:
      enabled: true
  security:
    enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
